<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <link rel="stylesheet" href="Styles.css"> 
    <script src="https://kit.fontawesome.com/7710cd6119.js" crossorigin="anonymous"></script>      
</head>

<body>

    <button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<script>
  const cognitoDomain = "https://ap-south-1j6kwvgfei.auth.ap-south-1.amazoncognito.com";
  const clientId = "sc1l35q653i9odmh81a2ejje4";
  const redirectUri = "https://dv99wmti0d91q.cloudfront.net"; // CloudFront URL

  // Login button → go to Cognito Hosted UI
  document.getElementById('loginBtn').addEventListener('click', () => {
    window.location.href = `${cognitoDomain}/login?client_id=${clientId}&response_type=token&scope=email+openid+profile&redirect_uri=${encodeURIComponent(redirectUri)}`;
  });

  // Logout button → clear token + go to logout URL
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('access_token');
    window.location.href = `${cognitoDomain}/logout?client_id=${clientId}&logout_uri=${encodeURIComponent(redirectUri)}`;
  });

  // When redirected back after login, store token
  if (window.location.hash.includes("access_token")) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = params.get("access_token");
    if (accessToken) {
      localStorage.setItem("access_token", accessToken);
      // Clean the URL so the token isn’t visible
      window.history.replaceState({}, document.title, redirectUri);
    }
  }
</script>

    <div class="top-section">
        <i class="fa-regular fa-user fa-3x"></i>
        <h1>Task Manager Pro</h1>
        <p>Your personal assistant</p>
    </div>
    
    <div class="main-section">
        <div class="left-section">
            <div class="form-container">

                <label for="userAnswer" id="title">Task Title <i class="fa-solid fa-heading"></i></label>
                <input type="text" id="userAnswer" placeholder="Enter task title" required>
    
                <label for="userAnswer2" id="description">Description <i class="fa-regular fa-file"></i></label>
                <textarea id="userAnswer2" placeholder="Enter task details" rows="3"></textarea>
                
                <label for="duedate" id="duedater">Due Date <i class="fa-solid fa-calendar"></i></label>
                <input type="date" id="duedate">
                
                <label for="Pri" id="Prio">Priority Level<i class="fa-solid fa-skull" style="margin-left:6px;"></i></label> 
                <select name="Prio" id="Pri">
                    <option value="none">None</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="severe">Severe</option>
                    <option value="GiveUp">Critical</option>
                </select>
                
                <div class="button-container">
                    <button id="SubmitB"><i class="fas fa-plus"></i> Add Task</button> 
                    <button id="RemoveB"><i class="fas fa-eraser"></i> Clear Form</button>
                </div>
            </div>
        </div>

        <div class="right-section">
            <h2><i class="fas fa-tasks"></i> Task List</h2>
            <ul id="taskList"></ul>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>    
</html>
